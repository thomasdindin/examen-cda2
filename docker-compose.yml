services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sportify
      POSTGRES_PASSWORD: sportify
      POSTGRES_DB: sportify_db
    volumes:
      - sportify_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportify -d sportify_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./sportify-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://sportify:sportify@postgres:5432/sportify_db?schema=public
      JWT_SECRET: sportify_jwt_secret_dev
      JWT_EXPIRES_IN: 1d
      PORT: 3000
      FRONTEND_URL: http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy

  front:
    build: ./sportify-front
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  sportify_postgres_data:
